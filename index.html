<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Social Media Platform</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <h1>Social Hub</h1>
        <p>Create posts, like others, and manage your account.</p>
      </div>
      <div class="profile-card" id="profileCard">
        <strong id="profileName">Loading...</strong>
        <p id="profileBio"></p>
        <div class="profile-stats">
          <span><strong id="followersCount">150</strong> Followers</span>
          <span><strong id="followingCount">100</strong> Following</span>
        </div>
      </div>
    </header>

    <main>
      <section class="auth-panel" id="authPanel">
        <h2>Sign In or Sign Up</h2>
        <div class="auth-grid">
          <form id="loginForm" class="auth-form">
            <h3>Login</h3>
            <input id="loginUsername" type="text" placeholder="Username" required />
            <input id="loginPassword" type="password" placeholder="Password" required />
            <button type="submit">Log In</button>
          </form>
          <form id="signupForm" class="auth-form">
            <h3>Sign Up</h3>
            <input id="signupUsername" type="text" placeholder="Choose username" required />
            <input id="signupPassword" type="password" placeholder="Choose password" required />
            <button type="submit">Create Account</button>
          </form>
        </div>
        <p id="authMessage" class="auth-message"></p>
      </section>

      <section class="post-creator hidden" id="postCreator">
        <h2>Create a post</h2>
        <form id="postForm">
          <textarea id="contentInput" rows="4" placeholder="Write something..." required></textarea>
          <button type="submit">Post</button>
        </form>
        <button id="logoutButton" class="secondary-button">Logout</button>
      </section>

      <section class="feed">
        <h2>Feed</h2>
        <div id="feedContainer" class="feed-container"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
